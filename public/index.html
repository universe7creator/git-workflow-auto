<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git Workflow Automator</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header-icon {
      width: 48px;
      height: 48px;
      margin-bottom: 0.75rem;
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      color: #f0f6fc;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: #8b949e;
      font-size: 1rem;
    }

    /* Input Card */
    .input-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .input-card label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #f0f6fc;
      margin-bottom: 0.5rem;
    }

    #git-input {
      width: 100%;
      min-height: 180px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.8125rem;
      padding: 0.875rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    #git-input:focus {
      border-color: #58a6ff;
    }

    #git-input::placeholder {
      color: #484f58;
    }

    #git-input.error {
      border-color: #f85149;
    }

    .error-msg {
      color: #f85149;
      font-size: 0.8125rem;
      margin-top: 0.5rem;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }

    /* Button */
    .btn-analyze {
      width: 100%;
      padding: 0.75rem 1.5rem;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-analyze:hover {
      background: #2ea043;
    }

    .btn-analyze:disabled {
      background: #1a4a28;
      cursor: not-allowed;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Output */
    #output {
      display: none;
      animation: slideIn 0.25s ease-out;
    }

    #output.visible {
      display: block;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .output-section {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .output-header {
      background: #0d1117;
      padding: 0.625rem 1rem;
      border-bottom: 1px solid #30363d;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8b949e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .output-body {
      padding: 1rem;
      font-size: 0.875rem;
      line-height: 1.6;
    }

    .branch-diagram {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8125rem;
      color: #3fb950;
      background: #0d1117;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      white-space: pre;
    }

    .commit-list {
      list-style: none;
    }

    .commit-list li {
      padding: 0.375rem 0;
      border-bottom: 1px solid #21262d;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8125rem;
      display: flex;
      gap: 0.5rem;
    }

    .commit-list li:last-child {
      border-bottom: none;
    }

    .commit-num {
      color: #58a6ff;
      font-weight: 600;
      min-width: 1.5rem;
    }

    .commit-type {
      color: #3fb950;
    }

    .commit-msg {
      color: #c9d1d9;
    }

    /* PR Description */
    .pr-content {
      font-size: 0.875rem;
      line-height: 1.7;
    }

    .pr-content h3 {
      color: #f0f6fc;
      font-size: 0.9375rem;
      margin: 0.75rem 0 0.5rem;
    }

    .pr-content h3:first-child {
      margin-top: 0;
    }

    .pr-content ul {
      padding-left: 1.25rem;
      margin: 0.375rem 0;
    }

    .pr-content li {
      margin: 0.25rem 0;
    }

    .pr-content code {
      background: #0d1117;
      padding: 0.125rem 0.375rem;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8125rem;
      color: #79c0ff;
    }

    /* Command Blocks */
    .cmd-block {
      position: relative;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      margin-bottom: 0.5rem;
    }

    .cmd-block:last-child {
      margin-bottom: 0;
    }

    .cmd-block pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8125rem;
      color: #c9d1d9;
      padding: 0.75rem 1rem;
      margin: 0;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .btn-copy {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
      font-size: 0.6875rem;
      font-weight: 600;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .btn-copy:hover {
      background: #30363d;
      color: #c9d1d9;
    }

    .btn-copy.copied {
      background: #238636;
      border-color: #238636;
      color: #fff;
    }

    /* Copy All */
    .btn-copy-all {
      width: 100%;
      padding: 0.625rem 1rem;
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 0.5rem;
    }

    .btn-copy-all:hover {
      background: #30363d;
    }

    .btn-copy-all.copied {
      background: #238636;
      border-color: #238636;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <svg class="header-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="#f85149"/>
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke="#58a6ff" stroke-width="1.5" fill="none"/>
        <path d="M9 12l2 2 4-4" stroke="#3fb950" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="9" stroke="#58a6ff" stroke-width="1.5" fill="none"/>
      </svg>
      <h1>Git Workflow Automator</h1>
      <p>Paste a diff, get a complete git workflow</p>
    </div>

    <!-- Input -->
    <div class="input-card">
      <label for="git-input">Paste git diff, branch name, or git log output</label>
      <textarea id="git-input" placeholder="Example diff:
diff --git a/src/auth.js b/src/auth.js
--- a/src/auth.js
+++ b/src/auth.js
@@ -12,6 +12,8 @@ function authenticate(user, pass) {
   if (!user || !pass) throw new Error('Missing credentials');
+  const hashed = await bcrypt.hash(pass, 10);
+  const token = jwt.sign({ userId: user.id }, process.env.JWT_SECRET);
   return { token, userId: user.id };

Or paste a branch name: feature/auth-jwt-123
Or paste git log output..."></textarea>
      <div id="error-msg" class="error-msg">Please paste some git content to analyze</div>
    </div>

    <button class="btn-analyze" id="btn-analyze" onclick="analyze()">
      <span id="btn-text">Analyze Git Workflow</span>
      <div id="spinner" class="spinner" style="display:none"></div>
    </button>

    <!-- Output -->
    <div id="output">
      <!-- Branch Strategy -->
      <div class="output-section">
        <div class="output-header">Branch Strategy</div>
        <div class="output-body">
          <div class="branch-diagram" id="branch-diagram"></div>
        </div>
      </div>

      <!-- Commit Sequence -->
      <div class="output-section">
        <div class="output-header">Commit Sequence</div>
        <div class="output-body">
          <ul class="commit-list" id="commit-list"></ul>
        </div>
      </div>

      <!-- PR Description -->
      <div class="output-section">
        <div class="output-header">PR Description</div>
        <div class="output-body">
          <div class="pr-content" id="pr-content"></div>
        </div>
      </div>

      <!-- One-Click Commands -->
      <div class="output-section">
        <div class="output-header">One-Click Commands</div>
        <div class="output-body" id="commands-body"></div>
      </div>

      <button class="btn-copy-all" id="btn-copy-all" onclick="copyAll()">Copy Full Workflow as Markdown</button>
    </div>
  </div>

  <script>
    // State
    let workflowData = null;

    // Analyze
    function analyze() {
      const input = document.getElementById('git-input').value.trim();
      const errorEl = document.getElementById('error-msg');
      const btn = document.getElementById('btn-analyze');
      const btnText = document.getElementById('btn-text');
      const spinner = document.getElementById('spinner');

      // Reset
      errorEl.classList.remove('visible');
      document.getElementById('git-input').classList.remove('error');
      document.getElementById('output').classList.remove('visible');

      if (!input) {
        document.getElementById('git-input').classList.add('error');
        errorEl.classList.add('visible');
        return;
      }

      // Loading
      btn.disabled = true;
      btnText.style.display = 'none';
      spinner.style.display = 'block';

      setTimeout(() => {
        workflowData = parseGitInput(input);
        renderOutput(workflowData);

        btn.disabled = false;
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        document.getElementById('output').classList.add('visible');
      }, 600);
    }

    // Parse input
    function parseGitInput(input) {
      const isDiff = input.includes('diff --git') || input.includes('@@');
      const isBranchName = /^([a-z]+[_/-])?[a-z]+-[a-z0-9-]+$/i.test(input.trim());
      const isGitLog = /^[a-f0-9]+\s/.test(input.trim().split('\n')[0]) || input.includes('commit ');

      if (isDiff) return parseDiff(input);
      if (isGitLog) return parseGitLog(input);
      return parseBranchName(input.trim());
    }

    function parseDiff(input) {
      const lines = input.split('\n');
      const changes = [];

      let currentFile = '';
      let added = 0;
      let removed = 0;

      for (const line of lines) {
        if (line.startsWith('diff --git')) {
          if (currentFile) {
            changes.push({ file: currentFile, added, removed });
          }
          const match = line.match(/diff --git a\/(.+?) b\/(.+)/);
          currentFile = match ? match[2] : 'unknown';
          added = 0;
          removed = 0;
        } else if (line.startsWith('+') && !line.startsWith('+++')) {
          added++;
        } else if (line.startsWith('-') && !line.startsWith('---')) {
          removed++;
        }
      }
      if (currentFile) changes.push({ file: currentFile, added, removed });

      // Analyze and categorize
      const commits = [];
      const fileGroups = { fix: [], feat: [], refactor: [], docs: [] };

      for (const c of changes) {
        if (c.file.includes('test') || c.file.includes('spec')) continue;
        if (c.file.includes('readme') || c.file.includes('changelog') || c.file.includes('docs')) {
          fileGroups.docs.push(c.file);
        } else if (c.added > c.removed) {
          fileGroups.feat.push(c.file);
        } else {
          fileGroups.fix.push(c.file);
        }
      }

      const shortFiles = changes.map(c => c.file.split('/').pop()).filter(Boolean);

      if (fileGroups.fix.length) {
        commits.push({ type: 'fix', msg: `resolve ${fileGroups.fix[0].split('/').pop()} bug` });
      }
      if (fileGroups.feat.length) {
        commits.push({ type: 'feat', msg: `add ${fileGroups.feat[0].split('/').pop()} functionality` });
      }
      if (fileGroups.docs.length) {
        commits.push({ type: 'docs', msg: `update ${fileGroups.docs[0].split('/').pop()}` });
      }
      if (commits.length === 0 && shortFiles.length) {
        commits.push({ type: 'chore', msg: `update ${shortFiles[0]}` });
      }

      return {
        type: 'diff',
        branch: shortFiles[0] ? `feature/${shortFiles[0].replace(/\.[^.]+$/, '').replace(/[^a-z0-9]/gi, '-')}` : 'feature/changes',
        commits,
        prTitle: commits[0] ? `${commits[0].type}: ${commits[0].msg}` : 'feat: implement new feature',
        files: shortFiles
      };
    }

    function parseGitLog(input) {
      const lines = input.trim().split('\n').filter(l => l.trim());
      const commits = [];

      for (const line of lines) {
        const commitMatch = line.match(/^([a-f0-9]{7,})\s+(.+)$/);
        if (commitMatch) {
          commits.push({ hash: commitMatch[1], msg: commitMatch[2].trim() });
        }
      }

      const branch = commits.length > 3 ? 'feature/cleanup' : 'feature/refactor';

      return {
        type: 'log',
        branch,
        commits: commits.slice(0, 5).map(c => ({
          type: c.msg.startsWith('fix') ? 'fix' : c.msg.startsWith('feat') ? 'feat' : 'chore',
          msg: c.msg
        })),
        prTitle: 'refactor: streamline codebase',
        files: []
      };
    }

    function parseBranchName(name) {
      const clean = name.replace(/^[^a-z]+/, '').replace(/[^a-z0-9]+/gi, ' ');
      return {
        type: 'branch',
        branch: name.startsWith('feature/') || name.startsWith('fix/') || name.startsWith('refactor/')
          ? name
          : `feature/${name.toLowerCase().replace(/[^a-z0-9]+/gi, '-')}`,
        commits: [
          { type: 'feat', msg: clean || 'implement new feature' },
          { type: 'test', msg: 'add tests for new functionality' },
          { type: 'docs', msg: 'update documentation' }
        ],
        prTitle: `feat: ${clean || 'new feature'}`,
        files: []
      };
    }

    // Render
    function renderOutput(data) {
      // Branch diagram
      document.getElementById('branch-diagram').textContent =
        `main ──────► ${data.branch} ──────► PR merge`;

      // Commit list
      const listEl = document.getElementById('commit-list');
      listEl.innerHTML = '';
      data.commits.forEach((c, i) => {
        const li = document.createElement('li');
        li.innerHTML = `<span class="commit-num">${i + 1}.</span><span class="commit-type">${c.type}:</span><span class="commit-msg">${c.msg}</span>`;
        listEl.appendChild(li);
      });

      // PR description
      const fileList = data.files.slice(0, 5).map(f => `- \`${f}\``).join('\n');
      const extraFiles = data.files.length > 5 ? `\n+ ${data.files.length - 5} more files` : '';

      document.getElementById('pr-content').innerHTML = `
        <h3>Summary</h3>
        <p>${data.prTitle}</p>
        <h3>Changes</h3>
        ${fileList ? `<ul>${data.files.slice(0, 5).map(f => `<li><code>${f}</code></li>`).join('')}</ul>` : '<p>See diff for full list of changes.</p>'}
        <h3>Testing</h3>
        <ul>
          <li>Run existing test suite: <code>npm test</code></li>
          <li>Verify changes locally before PR</li>
          <li>Check branch builds successfully</li>
        </ul>
      `;

      // Commands
      const body = document.getElementById('commands-body');
      body.innerHTML = '';

      const cmds = generateCommands(data);
      for (const cmd of cmds) {
        const block = document.createElement('div');
        block.className = 'cmd-block';
        block.innerHTML = `<pre>${escapeHtml(cmd)}</pre><button class="btn-copy" onclick="copyCmd(this, '${escapeAttr(cmd)}')">Copy</button>`;
        body.appendChild(block);
      }
    }

    function generateCommands(data) {
      const cmds = [];
      cmds.push(`git checkout -b ${data.branch}`);
      for (const c of data.commits) {
        cmds.push(`git add . && git commit -m "${c.type}: ${c.msg}"`);
      }
      cmds.push(`git push -u origin ${data.branch}`);
      cmds.push(`gh pr create --title "${data.prTitle}" --body "See PR description above" --base main`);
      return cmds;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function escapeAttr(str) {
      return str.replace(/'/g, '\\\'').replace(/\n/g, '\\n');
    }

    // Copy
    function copyCmd(btn, cmd) {
      navigator.clipboard.writeText(cmd).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 1500);
      });
    }

    function copyAll() {
      if (!workflowData) return;
      const md = [
        `# ${workflowData.prTitle}`,
        `## Branch Strategy`,
        `\`main\` → \`${workflowData.branch}\` → PR merge`,
        `## Commits`,
        ...workflowData.commits.map((c, i) => `${i + 1}. \`${c.type}: ${c.msg}\``),
        `## Commands`,
        ...generateCommands(workflowData).map(c => `\`\`\`\n${c}\n\`\`\``)
      ].join('\n\n');

      navigator.clipboard.writeText(md).then(() => {
        const btn = document.getElementById('btn-copy-all');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy Full Workflow as Markdown';
          btn.classList.remove('copied');
        }, 1500);
      });
    }
  </script>
</body>
</html>
